name: Deploy

run-name: Deploy - ${{ github.event.head_commit.message }}

permissions:
  contents: read

on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    environment:
      name: Production
      url: https://vocavault.ahmedmagdy.cloud

    steps:
      - name: VPS Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export PATH=/home/ahmedmagdy-vocavault/.nvm/versions/node/v22.23.1/bin:$PATH

            cd /home/ahmedmagdy-vocavault/htdocs/vocavault.ahmedmagdy.cloud

            git fetch origin
            git reset --hard origin/main

            npm ci
            npm run build

            pm2 restart vocavault

            sleep 5

            curl -f https://vocavault.ahmedmagdy.cloud
